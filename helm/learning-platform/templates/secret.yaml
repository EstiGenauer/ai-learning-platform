apiVersion: v1
kind: Secret
metadata:
  name: {{ include "learning-platform.fullname" . }}-secrets
  labels:
    {{- include "learning-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
