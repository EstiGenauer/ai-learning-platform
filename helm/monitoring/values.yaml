# Wrapper values for observability subcharts

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

promtail:
  enabled: true
  config:
    clients:
      - url: http://monitoring-loki:3100/loki/api/v1/push
    snippets:
      scrapeConfigs: |
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_node_name]
              target_label: node
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_container_name]
              target_label: container
            - action: replace
              replacement: /var/log/pods/*$1/*.log
              separator: /
              source_labels:
                - __meta_kubernetes_pod_uid
                - __meta_kubernetes_pod_container_name
              target_label: __path__

kube-prometheus-stack:
  crds:
    enabled: true

  defaultRules:
    create: true

  alertmanager:
    enabled: true
    alertmanagerSpec:
      retention: 120h

  prometheus:
    enabled: true
    ingress:
      enabled: false
    prometheusSpec:
      retention: 7d
      scrapeInterval: 30s
      evaluationInterval: 30s
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

  grafana:
    enabled: true
    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: browser
    adminUser: admin
    adminPassword: admin
    persistence:
      enabled: true
      size: 5Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.learning-platform.local
      annotations:
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
      datasources:
        enabled: true
        defaultDatasourceEnabled: true
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://monitoring-loki:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

grafanaDashboards:
  enabled: true

lokiIngress:
  enabled: false
  host: loki.learning-platform.local
