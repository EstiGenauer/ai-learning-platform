apiVersion: v2
name: monitoring
description: Prometheus, Grafana, Loki & Promtail for AI Learning Platform
type: application
version: 1.1.0
appVersion: "1.1.0"
keywords:
  - prometheus
  - grafana
  - loki
  - promtail
  - monitoring
  - observability
maintainers:
  - name: AI Learning Platform Team
dependencies:
  - name: kube-prometheus-stack
    version: "67.11.0"
    repository: https://prometheus-community.github.io/helm-charts
  - name: loki
    version: "6.30.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: promtail
    version: "6.16.6"
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
