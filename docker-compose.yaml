services:
  # שירות בסיס הנתונים הקיים שלך
  db:
    image: postgres:15
    container_name: learning_platform_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: learning_platform
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # שירות ה-Backend החדש
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learning_platform_api
    ports:
      - "5055:8080" # מפה את פורט 5055 של המחשב ל-8080 של הקונטיינר
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # מחרוזת החיבור ל-DB בתוך הדוקר (השם של השירות 'db' משמש כאן ככתובת)
      - ConnectionStrings__DefaultConnection=Host=db;Database=learning_platform;Username=admin;Password=password
      - OpenAi__ApiKey=${OPENAI_API_KEY}

    depends_on:
      - db

volumes:
  pgdata: