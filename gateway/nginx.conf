worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker Compose / Kubernetes embedded DNS. Resolving upstreams at request time
    # (instead of at startup) means the gateway starts even if a service is not up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;

    server {
        listen 8080;

        set $auth_service    auth-service:8080;
        set $catalog_service catalog-service:8080;
        set $ai_service      ai-service:8080;

        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # --- Admin endpoints are split across the services that own the data ---
        location = /api/Admin/users {
            proxy_pass http://$auth_service$request_uri;
        }

        location = /api/Admin/prompts {
            proxy_pass http://$ai_service$request_uri;
        }

        location ^~ /api/Admin/categories {
            proxy_pass http://$catalog_service$request_uri;
        }

        location ^~ /api/Admin/subcategories {
            proxy_pass http://$catalog_service$request_uri;
        }

        # --- Public / authenticated domain endpoints ---
        location ^~ /api/Auth {
            proxy_pass http://$auth_service$request_uri;
        }

        location ^~ /api/Categories {
            proxy_pass http://$catalog_service$request_uri;
        }

        location ^~ /api/Prompts {
            proxy_pass http://$ai_service$request_uri;
        }

        location / {
            default_type application/json;
            return 404 '{"message":"Not found at gateway."}';
        }
    }
}
