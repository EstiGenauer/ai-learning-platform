name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/LearningPlatformApi.sln

      - name: Build
        run: dotnet build backend/LearningPlatformApi.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/LearningPlatformApi.sln --no-build -c Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

  compose-integration:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Run Docker Compose integration tests
        run: |
          chmod +x tests/compose/run-tests.sh
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from tests
          docker compose -f docker-compose.test.yml down -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [compose-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t learning-platform-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t learning-platform-frontend:ci ./frontend
