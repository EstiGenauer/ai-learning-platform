name: ci-backend

on:
  push:
    branches: [main, master, ci-cd]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/ci-backend.yaml'
  pull_request:
    branches: [main, master, ci-cd]
    paths:
      - 'backend/**'
      - 'tests/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/ci-backend.yaml'

env:
  IMAGE_NAME: learning-platform-backend
  REGISTRY_GHCR: ghcr.io

jobs:
  # =========================
  # 1. UNIT TESTS
  # =========================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/LearningPlatformApi.sln

      - name: Build
        run: dotnet build backend/LearningPlatformApi.sln --no-restore -c Release

      - name: Run unit + API integration tests
        run: dotnet test backend/LearningPlatformApi.sln --no-build -c Release --verbosity normal

      - name: Test summary
        run: echo "✅ Backend unit tests passed"

  # =========================
  # 2. BUILD DOCKER IMAGE
  # =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }} dotnet --version
          echo "✅ Docker image works!"

  # =========================
  # 3. INTEGRATION TESTS
  # =========================
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/ci-cd' ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Run tests with Docker Compose
        run: |
          chmod +x tests/compose/run-tests.sh
          docker compose -f docker-compose.test.yml up --build \
            --abort-on-container-exit \
            --exit-code-from tests

      - name: Show logs
        if: always()
        run: docker compose -f docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Test summary
        run: echo "✅ Docker Compose integration tests passed"

  # =========================
  # 4. PUSH TO REGISTRIES
  # =========================
  push:
    name: Push to DockerHub & GHCR
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    permissions:
      contents: read
      packages: write
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ci-cd') &&
      needs.build.result == 'success' &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (reusing cache)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/backend:latest
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push summary
        run: echo "✅ Backend image pushed to DockerHub and GHCR"

  # =========================
  # 5. TAGGING
  # =========================
  tagging:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: write
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ci-cd') &&
      needs.push.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=$(echo "$LATEST_TAG" | sed 's/v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEW_VERSION"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "✅ Tag ${{ steps.version.outputs.version }} created!"

      - name: Tag Docker image with version
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push version tag to DockerHub
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # =========================
  # 6. POST STAGE - NOTIFICATION
  # =========================
  post-notification:
    name: Post-Action Notification
    runs-on: ubuntu-latest
    needs: [tagging, push, integration-tests, unit-tests]
    if: always()
    steps:
      - name: Send Mail Summary
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Backend: ${{ github.repository }} - ${{ job.status }}"
          to: Genauer1997@gmail.com
          from: GitHub Actions CI
          secure: true
          body: |
            Backend pipeline for ${{ github.repository }} has finished.

            Event: ${{ github.event_name }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow result: ${{ job.status }}

            Jobs:
            - unit-tests: ${{ needs.unit-tests.result }}
            - integration-tests: ${{ needs.integration-tests.result }}
            - push: ${{ needs.push.result }}
            - tagging: ${{ needs.tagging.result }}

            Full logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
