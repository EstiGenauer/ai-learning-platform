name: ci-frontend

on:
  push:
    branches: [main, master, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  pull_request:
    branches: [main, master, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'

env:
  IMAGE_NAME: learning-platform-frontend
  REGISTRY_GHCR: ghcr.io

jobs:
  # =========================
  # 1. UNIT TESTS
  # =========================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Test summary
        run: echo "✅ Frontend unit tests passed"

  # =========================
  # 2. BUILD DOCKER IMAGE
  # =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          build-args: |
            REACT_APP_API_URL=http://localhost:5055/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }} nginx -v
          echo "✅ Docker image works!"

  # =========================
  # 3. PUSH TO REGISTRIES
  # =========================
  push:
    name: Push to DockerHub & GHCR
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/ci-cd')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (reusing cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_URL=http://localhost:5055/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/frontend:latest
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push summary
        run: echo "✅ Frontend image pushed to DockerHub and GHCR"

  # =========================
  # 4. POST STAGE - NOTIFICATION
  # =========================
  post-notification:
    name: Post-Action Notification
    runs-on: ubuntu-latest
    needs: [push, build, unit-tests]
    if: always()
    steps:
      - name: Send Mail Summary
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Frontend: ${{ github.repository }} - ${{ job.status }}"
          to: Genauer1997@gmail.com
          from: GitHub Actions CI
          secure: true
          body: |
            Frontend pipeline for ${{ github.repository }} has finished.

            Event: ${{ github.event_name }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow result: ${{ job.status }}

            Jobs:
            - unit-tests: ${{ needs.unit-tests.result }}
            - build: ${{ needs.build.result }}
            - push: ${{ needs.push.result }}

            Full logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
