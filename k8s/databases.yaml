# Database-per-service: one PostgreSQL instance per microservice.
# auth-db ---------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
  namespace: learning-platform
  labels:
    app: auth-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: learning-platform-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: auth_db
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "auth_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: auth-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-db-pvc
  namespace: learning-platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: learning-platform
spec:
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432
---
