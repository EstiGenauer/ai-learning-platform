apiVersion: v1
kind: ConfigMap
metadata:
  name: learning-platform-config
  namespace: learning-platform
data:
  OPENAI_MODEL: "gpt-4o"
  REACT_APP_API_URL: "/api"
  ASPNETCORE_ENVIRONMENT: "Production"
  # Per-service connection strings are defined inline in each service Deployment,
  # since every microservice owns its own database (database-per-service).
