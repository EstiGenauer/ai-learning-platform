apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: learning-platform
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: learning-platform-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__DefaultConnection
              value: "Host=prompts-db;Port=5432;Database=prompts_db;Username=admin;Password=password;Timeout=5;Command Timeout=30"
            - name: Services__CatalogService
              value: "http://catalog-service:8080"
            - name: OpenAi__Model
              valueFrom:
                configMapKeyRef:
                  name: learning-platform-config
                  key: OPENAI_MODEL
            - name: OpenAi__ApiKey
              valueFrom:
                secretKeyRef:
                  name: learning-platform-secrets
                  key: OPENAI_API_KEY
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: learning-platform-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: learning-platform
spec:
  selector:
    app: ai-service
  ports:
    - port: 8080
      targetPort: 8080
