apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: learning-platform
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: learning-platform-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: learning-platform-config
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: OpenAi__ApiKey
              valueFrom:
                secretKeyRef:
                  name: learning-platform-secrets
                  key: OPENAI_API_KEY
            - name: OpenAi__Model
              valueFrom:
                configMapKeyRef:
                  name: learning-platform-config
                  key: OPENAI_MODEL
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: learning-platform-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: learning-platform
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
